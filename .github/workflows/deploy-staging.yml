name: Deploy to Staging

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Deploy on test-sanad
        working-directory: /var/www/hlshajarah
        run: |
          git fetch origin master
          git reset --hard origin/master
          git clean -fd
          echo "--- public/pics/new contents ---"
          ls -la public/pics/new | head -35
          npm install --legacy-peer-deps
          npm run build
          pm2 reload ecosystem.config.js
          pm2 save
          echo "--- smoke test slider image ---"
          curl -sLI "https://staging.hlshajara.com/pics/new/photo_5877261144118988365_y.jpg" | head -1
