name: Deploy to Staging

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Deploy on test-sanad
        working-directory: /var/www/hlshajarah
        run: |
          git pull origin master
          npm install --legacy-peer-deps
          npm run build
          pm2 reload ecosystem.config.js
          pm2 save
