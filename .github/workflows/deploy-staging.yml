name: Deploy to Staging

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Deploy on test-sanad
        working-directory: /var/www/hlshajarah
        run: |
          git fetch origin master
          git reset --hard origin/master
          git clean -fd -e .env* -e backups -e logs
          echo "--- public/pics/new contents ---"
          ls -la public/pics/new | head -35
          npm install --legacy-peer-deps
          npm run build
          pm2 startOrRestart ecosystem.config.js --update-env
          pm2 save
          echo "--- pm2 status ---"
          pm2 status
          echo "--- listening ports ---"
          ss -tlnp || netstat -tlnp || true
          echo "--- nginx upstream ---"
          grep -R "proxy_pass" /etc/nginx/sites-enabled/ /etc/nginx/conf.d/ /etc/nginx/nginx.conf 2>/dev/null | head -20 || true
          echo "--- local port checks ---"
          curl -sLI "http://127.0.0.1:3000/" | head -1 || true
          curl -sLI "http://127.0.0.1:3002/" | head -1 || true
          echo "--- recent app logs ---"
          pm2 logs hlshajarah-staging --lines 80 --nostream || true
          echo "--- smoke test slider image ---"
          curl -sLI "https://staging.hlshajara.com/pics/new/photo_5877261144118988365_y.jpg" | head -1
