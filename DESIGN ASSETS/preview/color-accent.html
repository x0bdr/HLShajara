<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--bg); padding:26px 30px; font-family:var(--font-sans); display:flex; flex-direction:column; gap:18px; }
  .grp { display:flex; flex-direction:column; gap:9px; }
  .cap { display:flex; align-items:baseline; gap:10px; }
  .cap h3 { margin:0; font-family:var(--font-display); font-size:18px; color:var(--fg1); }
  .cap span { font-size:11.5px; color:var(--fg2); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:58px; border-radius:var(--radius); display:flex; flex-direction:column; justify-content:flex-end; padding:7px; box-shadow:var(--inset-hair); }
  .sw .n { font-size:11px; font-weight:600; } .sw .h { font-family:var(--font-mono); font-size:9.5px; opacity:.85; }
  .d { color:#F6EFDF; } .l { color:var(--stone-800); }
</style>
</head>
<body>
  <div class="grp">
    <div class="cap"><h3>Brass</h3><span>The single accent — reserved for evidence strength</span></div>
    <div class="row">
      <div class="sw d" style="background:var(--brass-700)"><span class="n">700</span><span class="h">#6E4D1C</span></div>
      <div class="sw d" style="background:var(--brass-600)"><span class="n">600</span><span class="h">#8A6224</span></div>
      <div class="sw d" style="background:var(--brass-500)"><span class="n">500★</span><span class="h">#9A6B2B</span></div>
      <div class="sw l" style="background:var(--brass-300)"><span class="n">300</span><span class="h">#CDA86A</span></div>
      <div class="sw l" style="background:var(--brass-150)"><span class="n">150</span><span class="h">#ECDFC4</span></div>
      <div class="sw l" style="background:var(--brass-50)"><span class="n">50</span><span class="h">#F6EFDF</span></div>
    </div>
  </div>
  <div class="grp">
    <div class="cap"><h3>Paper &amp; brick</h3><span>Warm whites · muted brick for corrections</span></div>
    <div class="row">
      <div class="sw l" style="background:var(--paper)"><span class="n">paper</span><span class="h">#F7F3EA</span></div>
      <div class="sw l" style="background:var(--paper-raised)"><span class="n">raised</span><span class="h">#FCFAF3</span></div>
      <div class="sw l" style="background:var(--white)"><span class="n">white</span><span class="h">#FFFFFF</span></div>
      <div class="sw d" style="background:var(--brick-500)"><span class="n">brick</span><span class="h">#8C3A2E</span></div>
      <div class="sw l" style="background:var(--brick-100)"><span class="n">brick-100</span><span class="h">#F0DED9</span></div>
    </div>
  </div>
</body>
</html>
