<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--bg); padding:24px 30px; font-family:var(--font-sans); }
  table { width:100%; border-collapse:collapse; }
  td { padding:9px 6px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .chip { width:30px; height:30px; border-radius:var(--radius-sm); box-shadow:var(--inset-hair); display:inline-block; vertical-align:middle; }
  .tok { font-family:var(--font-mono); font-size:12px; color:var(--fg1); }
  .use { font-size:12.5px; color:var(--fg2); }
  h3 { margin:0 0 14px; font-family:var(--font-display); font-size:20px; color:var(--fg1); }
</style>
</head>
<body>
  <h3>Semantic tokens</h3>
  <table>
    <tr><td><span class="chip" style="background:var(--bg)"></span></td><td class="tok">--bg</td><td class="use">App background (paper)</td>
        <td><span class="chip" style="background:var(--surface)"></span></td><td class="tok">--surface</td><td class="use">Cards / panels</td></tr>
    <tr><td><span class="chip" style="background:var(--fg1)"></span></td><td class="tok">--fg1</td><td class="use">Primary text</td>
        <td><span class="chip" style="background:var(--fg2)"></span></td><td class="tok">--fg2</td><td class="use">Secondary text</td></tr>
    <tr><td><span class="chip" style="background:var(--fg3)"></span></td><td class="tok">--fg3</td><td class="use">Meta / timestamps</td>
        <td><span class="chip" style="background:var(--border)"></span></td><td class="tok">--border</td><td class="use">Hairlines</td></tr>
    <tr><td><span class="chip" style="background:var(--brand)"></span></td><td class="tok">--brand</td><td class="use">Primary actions</td>
        <td><span class="chip" style="background:var(--focus-ring)"></span></td><td class="tok">--focus-ring</td><td class="use">Focus outline (brass)</td></tr>
  </table>
</body>
</html>
