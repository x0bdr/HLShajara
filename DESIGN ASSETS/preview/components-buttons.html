<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--bg); padding:26px 30px; font-family:var(--font-sans); display:flex; flex-direction:column; gap:16px; }
  .lbl { font-family:var(--font-mono); font-size:11px; color:var(--fg3); margin-bottom:9px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .btn { font-family:var(--font-sans); font-size:14px; font-weight:600; padding:9px 18px; border-radius:var(--radius);
         border:1px solid transparent; cursor:pointer; transition:all var(--dur) var(--ease); }
  .primary { background:var(--brand); color:var(--on-green); }
  .primary:hover { background:var(--brand-hover); }
  .primary.press { background:var(--brand-press); transform:translateY(1px); }
  .secondary { background:var(--surface); color:var(--fg1); border-color:var(--border-strong); }
  .secondary:hover { background:var(--stone-100); }
  .ghost { background:transparent; color:var(--brand); }
  .ghost:hover { background:var(--green-50); }
  .danger { background:transparent; color:var(--brick-500); border-color:var(--brick-100); }
  .danger:hover { background:var(--brick-100); }
  .disabled { background:var(--stone-100); color:var(--stone-400); border-color:var(--border); cursor:not-allowed; }
  .focus { outline:2px solid var(--focus-ring); outline-offset:2px; }
</style>
</head>
<body>
  <div><div class="lbl">variants</div>
    <div class="row">
      <button class="btn primary">Publish entry</button>
      <button class="btn secondary">Save draft</button>
      <button class="btn ghost">View sources</button>
      <button class="btn danger">Request takedown</button>
    </div>
  </div>
  <div><div class="lbl">primary — default · hover · pressed · focus · disabled</div>
    <div class="row">
      <button class="btn primary">Default</button>
      <button class="btn primary" style="background:var(--brand-hover)">Hover</button>
      <button class="btn primary press">Pressed</button>
      <button class="btn primary focus">Focus</button>
      <button class="btn disabled">Disabled</button>
    </div>
  </div>
  <div><div class="lbl">Arabic (RTL)</div>
    <div class="row" dir="rtl">
      <button class="btn primary">نشر السجلّ</button>
      <button class="btn secondary">حفظ مسودة</button>
      <button class="btn ghost">عرض المصادر</button>
    </div>
  </div>
</body>
</html>
