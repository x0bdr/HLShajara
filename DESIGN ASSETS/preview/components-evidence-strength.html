<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--bg); padding:24px 30px; font-family:var(--font-sans); }
  h3 { margin:0 0 4px; font-family:var(--font-display); font-size:19px; color:var(--fg1); }
  .sub { margin:0 0 16px; font-size:12px; color:var(--fg2); }
  .ladder { display:flex; flex-direction:column; gap:8px; }
  .ev { display:flex; align-items:center; gap:12px; }
  .pill { display:inline-flex; align-items:center; gap:7px; padding:5px 11px; border-radius:var(--radius-pill);
          font-size:12.5px; font-weight:600; border:1px solid; white-space:nowrap; }
  .dot { width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.9; }
  .ar { direction:rtl; font-size:12.5px; color:var(--fg2); }
  .e0{color:var(--ev-0-fg);background:var(--ev-0-bg);border-color:var(--ev-0-bd)}
  .e1{color:var(--ev-1-fg);background:var(--ev-1-bg);border-color:var(--ev-1-bd)}
  .e2{color:var(--ev-2-fg);background:var(--ev-2-bg);border-color:var(--ev-2-bd)}
  .e3{color:var(--ev-3-fg);background:var(--ev-3-bg);border-color:var(--ev-3-bd)}
  .e4{color:var(--ev-4-fg);background:var(--ev-4-bg);border-color:var(--ev-4-bd)}
</style>
</head>
<body>
  <h3>Evidence strength</h3>
  <p class="sub">The single accent (brass) intensifies up the ladder; the strongest rung is institutional green.</p>
  <div class="ladder">
    <div class="ev"><span class="pill e0"><span class="dot"></span>Under review</span><span class="ar">قيد المراجعة</span></div>
    <div class="ev"><span class="pill e1"><span class="dot"></span>Single credible source</span><span class="ar">مصدر موثوق واحد</span></div>
    <div class="ev"><span class="pill e2"><span class="dot"></span>Multi-source corroborated</span><span class="ar">مؤكَّد بمصادر متعددة</span></div>
    <div class="ev"><span class="pill e3"><span class="dot"></span>UN / IIIM-documented</span><span class="ar">موثّق أمميًّا</span></div>
    <div class="ev"><span class="pill e4"><span class="dot"></span>Court-confirmed</span><span class="ar">مؤكَّد قضائيًّا</span></div>
  </div>
</body>
</html>
