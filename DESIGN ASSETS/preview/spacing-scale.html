<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--bg); padding:26px 30px; font-family:var(--font-sans); }
  h3 { margin:0 0 16px; font-family:var(--font-display); font-size:20px; color:var(--fg1); }
  .r { display:flex; align-items:center; gap:14px; margin-bottom:9px; }
  .k { font-family:var(--font-mono); font-size:11px; color:var(--fg3); width:88px; flex:none; }
  .bar { height:14px; background:var(--green-700); border-radius:2px; }
</style>
</head>
<body>
  <h3>Spacing — 4px base</h3>
  <div class="r"><span class="k">1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="r"><span class="k">2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="k">3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="r"><span class="k">4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="k">6 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="k">8 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="k">12 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="k">16 · 64px</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="k">24 · 96px</span><div class="bar" style="width:96px"></div></div>
</body>
</html>
