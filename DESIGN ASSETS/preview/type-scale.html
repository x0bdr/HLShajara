<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--bg); padding:24px 30px; display:flex; flex-direction:column; gap:9px; font-family:var(--font-sans); }
  .r { display:flex; align-items:baseline; gap:16px; }
  .k { font-family:var(--font-mono); font-size:11px; color:var(--fg3); width:96px; flex:none; }
  .v { color:var(--fg1); white-space:nowrap; }
  .mono-row { margin-top:6px; padding-top:12px; border-top:1px solid var(--border); }
  code { font-family:var(--font-mono); font-size:13px; color:var(--brass-700); background:var(--brass-50);
         padding:2px 7px; border-radius:var(--radius-sm); }
</style>
</head>
<body>
  <div class="r"><span class="k">3xl / 48</span><span class="v ds-h1">Entity record</span></div>
  <div class="r"><span class="k">2xl / 36</span><span class="v" style="font-family:var(--font-display);font-size:var(--text-2xl)">Allegation</span></div>
  <div class="r"><span class="k">xl / 28</span><span class="v" style="font-family:var(--font-display);font-size:var(--text-xl)">Source citation</span></div>
  <div class="r"><span class="k">lg / 22</span><span class="v" style="font-size:var(--text-lg)">Lead paragraph</span></div>
  <div class="r"><span class="k">md / 18</span><span class="v" style="font-size:var(--text-md)">Comfortable body text</span></div>
  <div class="r"><span class="k">base / 16</span><span class="v" style="font-size:var(--text-base)">Minimum body size</span></div>
  <div class="r"><span class="k">sm / 14</span><span class="v" style="font-size:var(--text-sm)">Caption &amp; label</span></div>
  <div class="r"><span class="k">xs / 12</span><span class="v" style="font-size:var(--text-xs)">Meta &amp; timestamps</span></div>
  <div class="mono-row r"><span class="k">mono</span><span class="v"><code>ENT-2024-0117</code> &nbsp; <code>SRC · Tier A</code> &nbsp; <code>v3 · audit</code></span></div>
</body>
</html>
